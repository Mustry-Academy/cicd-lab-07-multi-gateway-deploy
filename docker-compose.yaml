name: lab07

services:
  gateway:
    image: inductiveautomation/ignition:8.3.6
    container_name: lab07-gateway
    hostname: lab07-gateway
    user: root
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - gateway-data:/usr/local/bin/ignition/data
      - ./projects:/usr/local/bin/ignition/data/projects
      - ./services/config:/usr/local/bin/ignition/data/config
      - ./services/modules.json:/usr/local/bin/ignition/data/modules.json
      - ./third-party-modules:/third-party-modules:ro
      # Local stand-ins for the capstone's referenced secrets: the same
      # file-type secret provider config that reads /run/secrets/ on
      # production reads these here. Known local-dev defaults, not secrets.
      - ./dev/secrets:/run/secrets:ro
    environment:
      ACCEPT_IGNITION_EULA: "Y"
      IGNITION_EDITION: standard
      GATEWAY_ADMIN_USERNAME: admin
      GATEWAY_ADMIN_PASSWORD: password
      TZ: "Europe/Brussels"
      GATEWAY_MODULES_ENABLED: >-
        com.inductiveautomation.alarm-notification,
        com.inductiveautomation.eventstream,
        com.inductiveautomation.historian,
        com.inductiveautomation.connectors.kafka,
        com.inductiveautomation.opcua.drivers.modbus,
        com.inductiveautomation.opcua,
        com.inductiveautomation.perspective,
        com.inductiveautomation.reporting,
        com.inductiveautomation.historian.sql,
        com.inductiveautomation.symbol-factory,
        com.inductiveautomation.opcua.drivers.tcpudp,
        com.inductiveautomation.webdev,
        com.inductiveautomation.jdbc.postgresql,
        com.mussonindustrial.embr.charts
      ACCEPT_MODULE_LICENSES: >-
        com.mussonindustrial.embr.charts
      ACCEPT_MODULE_CERTS: >-
        com.inductiveautomation.alarm-notification,
        com.inductiveautomation.eventstream,
        com.inductiveautomation.historian,
        com.inductiveautomation.connectors.kafka,
        com.inductiveautomation.opcua.drivers.modbus,
        com.inductiveautomation.opcua,
        com.inductiveautomation.perspective,
        com.inductiveautomation.reporting,
        com.inductiveautomation.historian.sql,
        com.inductiveautomation.symbol-factory,
        com.inductiveautomation.opcua.drivers.tcpudp,
        com.inductiveautomation.webdev,
        com.inductiveautomation.jdbc.postgresql,
        com.mussonindustrial.embr.charts
    command: >
      -n lab07-local
      -m 1024
      --
      wrapper.java.initmemory=256
      -Dignition.allowunsignedmodules=true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - default

  gateway-test:
    image: inductiveautomation/ignition:8.3.6
    container_name: lab07-gateway-test
    hostname: lab07-gateway-test
    user: root
    restart: unless-stopped
    ports:
      - "8090:8088"
    volumes:
      - test-gateway-data:/usr/local/bin/ignition/data
    environment:
      <<: *ignition-env
      GATEWAY_ADMIN_USERNAME: "${GATEWAY_ADMIN_USERNAME_TEST:-admin}"
      GATEWAY_ADMIN_PASSWORD: "${GATEWAY_ADMIN_PASSWORD_TEST:-password}"
      ACCEPT_IGNITION_EULA: "Y"
      IGNITION_EDITION: standard
      TZ: "Europe/Brussels"
      GATEWAY_MODULES_ENABLED: >-
        com.inductiveautomation.alarm-notification,
        com.inductiveautomation.eventstream,
        com.inductiveautomation.historian,
        com.inductiveautomation.connectors.kafka,
        com.inductiveautomation.opcua.drivers.modbus,
        com.inductiveautomation.opcua,
        com.inductiveautomation.perspective,
        com.inductiveautomation.reporting,
        com.inductiveautomation.historian.sql,
        com.inductiveautomation.symbol-factory,
        com.inductiveautomation.opcua.drivers.tcpudp,
        com.inductiveautomation.webdev,
        com.inductiveautomation.jdbc.postgresql,
        com.mussonindustrial.embr.charts
      ACCEPT_MODULE_LICENSES: >-
        com.mussonindustrial.embr.charts
      ACCEPT_MODULE_CERTS: >-
        com.inductiveautomation.alarm-notification,
        com.inductiveautomation.eventstream,
        com.inductiveautomation.historian,
        com.inductiveautomation.connectors.kafka,
        com.inductiveautomation.opcua.drivers.modbus,
        com.inductiveautomation.opcua,
        com.inductiveautomation.perspective,
        com.inductiveautomation.reporting,
        com.inductiveautomation.historian.sql,
        com.inductiveautomation.symbol-factory,
        com.inductiveautomation.opcua.drivers.tcpudp,
        com.inductiveautomation.webdev,
        com.inductiveautomation.jdbc.postgresql,
        com.mussonindustrial.embr.charts
    command: >
      -n lab07-local-test
      -m 1024
      --
      wrapper.java.initmemory=256
      -Dignition.allowunsignedmodules=true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - default

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: lab07-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ignition
      POSTGRES_USER: ignition
      POSTGRES_PASSWORD: lab07-postgres-pw
      TZ: "Europe/Brussels"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ignition -d ignition"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    networks:
      - default

  # --- self-hosted GitHub Actions runner -------------------------------------
  # Auto-registers against the repo set in RUNNER_REPO_URL using a GitHub
  # Personal Access Token (RUNNER_GITHUB_PAT, must have `repo` scope). The
  # image uses that PAT to fetch its own short-lived registration token, so
  # you never mint one by hand. Reuse the same PAT you created in Lab 04.
  #
  # The runner sits on the lab's compose network, so it reaches the gateways by
  # service name (gateway-loc, gateway-dev, gateway-prod) — see the
  # IGNITION_URL defaults in .github/workflows/deploy.yml.
  #
  # Why /var/run/docker.sock is mounted: deploy.yml uses
  # `docker cp` and `docker exec` to push project files INTO the dev/prod
  # gateway containers. That requires the runner to talk to the host's
  # Docker daemon. Lab convenience, NOT a production pattern.
  github-runner:
    image: myoung34/github-runner:latest
    container_name: lab07-runner
    hostname: lab07-runner
    restart: unless-stopped
    environment:
      REPO_URL: "${RUNNER_REPO_URL}"
      ACCESS_TOKEN: "${RUNNER_GITHUB_PAT}"
      RUNNER_NAME: "${RUNNER_NAME:-lab07-runner}"
      RUNNER_SCOPE: repo
      LABELS: "${RUNNER_LABEL}"
      # No EPHEMERAL here on purpose: the image treats ANY non-empty value
      # (even "false") as "enable --ephemeral". Leave it unset for a
      # persistent runner.
      DISABLE_AUTO_UPDATE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default

volumes:
  gateway-data:
  test-gateway-data:
  postgres-data:
