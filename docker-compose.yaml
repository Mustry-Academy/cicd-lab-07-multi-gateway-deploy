# Mustry Academy — Lab 07 local dev environment
#
# The lab's ONE production gateway lives at https://cloud.mustrysolutions.com
# and is only ever changed by the pipeline (release.yaml). You build and test
# HERE first — one local gateway and one local postgres, wired like the local
# stacks of the previous labs:
#
#   gateway    http://localhost:8088   admin / MergeIntoMain! (same login as
#                                      the cloud gateway — one less thing to
#                                      remember). Bind-mounts THE REPO:
#                                      ./projects, ./services/config,
#                                      ./services/modules.json and
#                                      ./third-party-modules. A save in the
#                                      Designer lands straight in your
#                                      working tree: `git status` IS the
#                                      export step. Review the diff, commit
#                                      only what you meant to change.
#   postgres   localhost:5432          database `ignition`, login
#                                      ignition / lab07-postgres-pw — the
#                                      local stand-in for the capstone's
#                                      course database. scripts/migrate.sh
#                                      runs your db-migration pairs here.
#
# Run it:
#   docker compose up -d
#   open http://localhost:8088
#
# Library JARs (modules/jar/) load from lib/core/gateway, which cannot be
# bind-mounted (it holds Ignition's own JARs). Copy them in once, then
# restart:
#   docker cp modules/jar/commons-lang3-3.19.0.jar \
#     lab07-gateway:/usr/local/bin/ignition/lib/core/gateway/
#   docker restart lab07-gateway
#
# Known limitation: config resources with EMBEDDED encrypted values exported
# from the cloud gateway (e.g. the "Ignition OPC UA Server" connection's
# client password) cannot decrypt locally — they were encrypted with the
# cloud gateway's keys and those keys never leave it. Re-save such a resource
# locally if you need it working here, and do NOT commit that machine-local
# rewrite (it would break the cloud gateway the same way in reverse).
#
# Expected first-boot churn: a fresh local gateway rewrites TWO tracked
# files in the mounted config — system-properties (its own systemName) and
# security-properties (its own auth setup, which drops the cloud's APIKEY
# level). Leave them dirty locally and NEVER commit them; CI blocks the PR
# if you do.

name: lab07

services:
  gateway:
    image: inductiveautomation/ignition:8.3.7
    container_name: lab07-gateway
    hostname: lab07-gateway
    # root so the gateway can write into the bind-mounted repo dirs
    # regardless of who owns them on the host (the previous labs' pattern).
    user: root
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      # Internal state (db, logs, certs) stays in the named volume; only the
      # deployable surfaces are bind-mounted from the repo.
      - gateway-data:/usr/local/bin/ignition/data
      - ./projects:/usr/local/bin/ignition/data/projects
      - ./services/config:/usr/local/bin/ignition/data/config
      - ./services/modules.json:/usr/local/bin/ignition/data/modules.json
      - ./third-party-modules:/third-party-modules
      # Local stand-ins for the capstone's referenced secrets: the same
      # file-type secret provider config that reads /run/secrets/ on
      # production reads these here. Known local-dev defaults, not secrets.
      - ./dev/secrets:/run/secrets:ro
    environment:
      ACCEPT_IGNITION_EULA: "Y"
      IGNITION_EDITION: standard
      GATEWAY_ADMIN_USERNAME: admin
      # Plain env is fine LOCALLY (trial gateway, loopback only). The cloud
      # gateway gets its password as a file-based secret — see capstone/.
      GATEWAY_ADMIN_PASSWORD: MergeIntoMain!
      TZ: "Europe/Brussels"
    command: >
      -n lab07-local
      -m 1024
      --
      wrapper.java.initmemory=256
      -Dignition.allowunsignedmodules=true
      -Dignition.gateway.externalModulesFolder=/third-party-modules
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default

  # ---- Part 0: the personal test gateway (provided — this is not a docker
  # course). Start it with:
  #
  #   LAB_USER=<yourname> RUNNER_TOKEN=<from Sam or Jasper> \
  #     docker compose --profile test up -d
  #
  # It tracks a SECOND clone of this repo at ../lab07-test (make it first:
  # git clone <this repo> ../lab07-test). Your test-<yourname>.yml workflow
  # fast-forwards that clone and restarts this gateway; your working clone
  # never gets touched by the pipeline. Plain `docker compose up -d` starts
  # only the dev stack above — the test pair only rides the --profile flag.
  test-gateway:
    profiles: ["test"]
    image: inductiveautomation/ignition:8.3.7
    container_name: lab07-test-gateway
    hostname: lab07-test-gateway
    user: root
    restart: unless-stopped
    ports:
      - "8090:8088"
    volumes:
      - test-gateway-data:/usr/local/bin/ignition/data
      - ../lab07-test/projects:/usr/local/bin/ignition/data/projects
      - ../lab07-test/services/config:/usr/local/bin/ignition/data/config
      - ../lab07-test/services/modules.json:/usr/local/bin/ignition/data/modules.json
      - ../lab07-test/third-party-modules:/third-party-modules
      - ../lab07-test/dev/secrets:/run/secrets:ro
    environment:
      ACCEPT_IGNITION_EULA: "Y"
      IGNITION_EDITION: standard
      GATEWAY_ADMIN_USERNAME: admin
      GATEWAY_ADMIN_PASSWORD: MergeIntoMain!
      TZ: "Europe/Brussels"
    command: >
      -n lab07-test
      -m 1024
      --
      wrapper.java.initmemory=256
      -Dignition.allowunsignedmodules=true
      -Dignition.gateway.externalModulesFolder=/third-party-modules
      -Dignition.config.mode=dev
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default

  # The laptop runner your test-<yourname>.yml runs on. Registration needs a
  # repo-admin token, which contributors cannot mint — RUNNER_TOKEN comes
  # from Sam or Jasper (valid 1 h; only needed on FIRST start, the
  # registration persists in the runner-state volume afterwards).
  test-runner:
    profiles: ["test"]
    image: myoung34/github-runner:latest
    container_name: lab07-test-runner
    hostname: lab07-test-runner
    restart: unless-stopped
    environment:
      REPO_URL: "https://github.com/Mustry-Academy/cicd-lab-07-multi-gateway-deploy"
      RUNNER_TOKEN: "${RUNNER_TOKEN:-}"
      RUNNER_NAME: "${LAB_USER:-UNSET}-local-runner"
      RUNNER_SCOPE: repo
      # If this says UNSET you forgot LAB_USER=<yourname> on the compose command.
      LABELS: "self-hosted,${LAB_USER:-UNSET}-local"
      DISABLE_AUTO_UPDATE: "true"
      # Persist the registration across recreates (same move as the capstone
      # runner): first start needs RUNNER_TOKEN, later starts do not.
      CONFIGURED_ACTIONS_RUNNER_FILES_DIR: /runner-state
      DISABLE_AUTOMATIC_DEREGISTRATION: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../lab07-test:/workspace/lab07-test
      - test-runner-state:/runner-state
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default

  postgres:
    image: postgres:17.5
    container_name: lab07-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ignition
      POSTGRES_USER: ignition
      POSTGRES_PASSWORD: lab07-postgres-pw
      TZ: "Europe/Brussels"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ignition -d ignition"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    networks:
      - default

volumes:
  gateway-data:
  test-gateway-data:
  test-runner-state:
  postgres-data:
