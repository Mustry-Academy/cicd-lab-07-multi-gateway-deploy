
name: lab07

services:
  gateway:
    image: inductiveautomation/ignition:8.3.6
    container_name: lab07-gateway
    hostname: lab07-gateway
    user: root
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      - gateway-data:/usr/local/bin/ignition/data
      - ./projects:/usr/local/bin/ignition/data/projects
      - ./services/config:/usr/local/bin/ignition/data/config
      # Local stand-ins for the capstone's referenced secrets: the same
      # file-type secret provider config that reads /run/secrets/ on
      # production reads these here. Known local-dev defaults, not secrets.
      - ./dev/secrets:/run/secrets:ro
    environment:
      ACCEPT_IGNITION_EULA: "Y"
      IGNITION_EDITION: standard
      GATEWAY_ADMIN_USERNAME: admin
      GATEWAY_ADMIN_PASSWORD: password
      TZ: "Europe/Brussels"
    command: >
      -n lab07-local
      -m 1024
      --
      wrapper.java.initmemory=256
      -Dignition.allowunsignedmodules=true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - default

  # ---- Part 1: the personal test gateway (provided — this is not a docker
  # course). Start it with:
  #
  #   LAB_USER=<yourname> RUNNER_TOKEN=<from Sam or Jasper> \
  #     docker compose --profile test up -d
  #
  # It tracks a SECOND clone of this repo at ../lab07-test (make it first:
  # git clone <this repo> ../lab07-test). Your test-<yourname>.yml workflow
  # fast-forwards that clone; your working clone never gets touched by the
  # pipeline. Plain `docker compose up -d` starts only the dev stack above.
  test-gateway:
    profiles: ["test"]
    image: inductiveautomation/ignition:8.3.6
    container_name: lab07-test-gateway
    hostname: lab07-test-gateway
    user: root
    restart: unless-stopped
    ports:
      - "8090:8088"
    volumes:
      - test-gateway-data:/usr/local/bin/ignition/data
      - ../lab07-test/projects:/usr/local/bin/ignition/data/projects
      - ../lab07-test/services/config:/usr/local/bin/ignition/data/config
      - ../lab07-test/dev/secrets:/run/secrets:ro
    environment:
      ACCEPT_IGNITION_EULA: "Y"
      IGNITION_EDITION: standard
      GATEWAY_ADMIN_USERNAME: admin
      GATEWAY_ADMIN_PASSWORD: password
      TZ: "Europe/Brussels"
    command: >
      -n lab07-test
      -m 1024
      --
      wrapper.java.initmemory=256
      -Dignition.allowunsignedmodules=true
      -Dignition.config.mode=dev
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/StatusPing"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default

  # The laptop runner your test-<yourname>.yml runs on. Registration needs a
  # repo-admin token, which contributors cannot mint — RUNNER_TOKEN comes
  # from Sam or Jasper (only needed on FIRST start; the registration
  # persists in the runner-state volume afterwards).
  test-runner:
    profiles: ["test"]
    image: myoung34/github-runner:latest
    container_name: lab07-test-runner
    hostname: lab07-test-runner
    restart: unless-stopped
    environment:
      REPO_URL: "${LAB_REPO:-https://github.com/Mustry-Academy/cicd-lab-07-multi-gateway-deploy}"
      RUNNER_TOKEN: "${RUNNER_TOKEN:-}"
      RUNNER_NAME: "${LAB_USER:-UNSET}-local-runner"
      RUNNER_SCOPE: repo
      # If this says UNSET you forgot LAB_USER=<yourname> on the compose command.
      LABELS: "self-hosted,${LAB_USER:-UNSET}-local"
      DISABLE_AUTO_UPDATE: "true"
      CONFIGURED_ACTIONS_RUNNER_FILES_DIR: /runner-state
      DISABLE_AUTOMATIC_DEREGISTRATION: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../lab07-test:/workspace/lab07-test
      - test-runner-state:/runner-state
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - default

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: lab07-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ignition
      POSTGRES_USER: ignition
      POSTGRES_PASSWORD: lab07-postgres-pw
      TZ: "Europe/Brussels"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ignition -d ignition"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "200k"
        max-file: "10"
    networks:
      - default

volumes:
  gateway-data:
  test-gateway-data:
  postgres-data:
  test-runner-state:
