# Tell actionlint about the custom self-hosted runner label this repo's
# deploy workflows target (the runner inside the capstone stack on
# cloud.mustrysolutions.com). Without this, actionlint flags it as unknown.
self-hosted-runner:
  labels:
    - cicd-capstone
    # Part 0: every student's personal test-gateway runner label follows the
    # <yourname>-local convention — one glob covers them all, so a student's
    # test-<yourname>.yml PR needs no edits here.
    - "*-local"
